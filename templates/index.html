<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Assistance App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
    background-image: url("{{ url_for('static', filename='travel-background.jpg') }}"); 
    background-size: cover; 
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    min-height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.card { 
    border: none; 
    border-radius: 15px; 
    overflow: hidden; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    background-color: rgba(255, 255, 255, 0.95);
}
.hero { 
    background: linear-gradient(rgba(13, 110, 253, 0.7), rgba(10, 88, 202, 0.7)), 
                url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=1374&q=80'); 
    background-size: cover; 
    background-position: center; 
    color: white; 
    padding: 80px 0; 
    margin-bottom: 40px; 
    border-radius: 0 0 20px 200px;
}
.itinerary-day { border-left: 5px solid #0d6efd; background: #fff; margin-bottom: 15px; padding: 20px; border-radius: 0 10px 10px 0; transition: transform 0.2s; }
.itinerary-day:hover { transform: translateX(5px); }
.spinner-container { display: none; margin-top: 20px; }
.dest-img { height: 400px; object-fit: cover; width: 100%; }
.btn-primary { border-radius: 10px; padding: 12px; font-weight: 600; }
</style>
</head>
<body>

<div class="hero text-center">
    <div class="container">
        <h1 class="display-4 fw-bold"><i class="fa-solid fa-earth-africa me-2"></i> TRAVEL ASSISTANCE APP </h1>
        <p class="lead">Enjoy Your Trip Mate</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 sticky-top" style="top: 20px;">
                <h4 class="mb-4 text-primary"><i class="fa-solid fa-earth-africa me-2"></i>Plan New Trip</h4>
                <div class="mb-3">
                    <label class="form-label fw-bold">Destination</label>
                    <input type="text" id="dest" class="form-control form-control-lg" placeholder="e.g. Zanzibar">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Duration (Days)</label>
                    <input type="number" id="days" class="form-control" value="3" min="1">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Style</label>
                    <select id="style" class="form-select">
                        <option value="budget">Budget (Economy)</option>
                        <option value="mid-range" selected>Mid-Range (Standard)</option>
                        <option value="luxury">Luxury (Premium)</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100 shadow-sm" onclick="planTrip()">
                    Generate Itinerary <i class="fa-solid fa-wand-magic-sparkles ms-2"></i>
                </button>
            </div>
        </div>

        <div class="col-md-8">
            <div id="loader" class="spinner-container text-center">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
                <p class="mt-3 fs-5 text-white">Scanning memory and crafting your perfect trip...</p>
            </div>

            <div id="output">
                <div class="text-center text-white mt-5">
                    <i class="fa-solid fa-map-location-dot fa-4x mb-3"></i>
                    <p class="fs-5">Your dream itinerary will appear here.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const PEXELS_API_KEY = "az8s4eAulxKSfneBGMRNxWIAsfsrYCRqngCscLP8QP6qsS4002oR6ml1";
const WEATHER_API_KEY = "9ec3d1834a240dd189719cf6f6450a54";

async function getPexelsImage(city) {
    const url = `https://api.pexels.com/v1/search?query=${encodeURIComponent(city + " city landscape")}&per_page=1`;
    try {
        const res = await fetch(url, { headers: { Authorization: PEXELS_API_KEY } });
        const data = await res.json();
        return data.photos?.[0]?.src?.landscape || 
               "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1200&q=80";
    } catch (e) {
        console.error("Pexels API error:", e);
        return "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1200&q=80";
    }
}

async function getWeather(city) {
    try {
        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${WEATHER_API_KEY}`
        );
        const data = await res.json();
        if (data.cod === 200) {
            return { temp: Math.round(data.main.temp), condition: data.weather[0].main };
        } else {
            return null;
        }
    } catch (e) {
        console.error("Weather API error:", e);
        return null;
    }
}

async function planTrip() {
    const destInput = document.getElementById('dest').value.trim();
    const days = document.getElementById('days').value;
    const style = document.getElementById('style').value;

    if (!destInput) { alert("Please enter a destination!"); return; }

    document.getElementById('loader').style.display = 'block';
    document.getElementById('output').innerHTML = '';

    const [imageUrl, weather] = await Promise.all([getPexelsImage(destInput), getWeather(destInput)]);

    // Weather tip only in Weather Condition section
    let weatherTip = weather ? `The weather in ${destInput} will be ${weather.condition}, ${weather.temp}°C` : 'Weather data unavailable';

    document.getElementById('output').innerHTML = `
        <div class="card mb-5 shadow-lg">
            <img src="${imageUrl}" class="dest-img" alt="${destInput}" 
                 onerror="this.src='https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1200&q=80'">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h1 class="display-6 fw-bold text-dark mb-0">${destInput}</h1>
                        <p class="text-muted fs-5"><i class="fa-solid fa-calendar-day me-2"></i>${days} Days Trip</p>
                    </div>
                    <span class="badge rounded-pill bg-success px-4 py-2 fs-6">${style.toUpperCase()}</span>
                </div>
                <h5 class="fw-bold text-dark"><i class="fa-solid fa-cloud-sun me-2"></i>Weather Condition</h5>
                <ul class="mt-3 mb-0">
                    <li class="mb-1 text-dark">${weatherTip}</li>
                </ul>
            </div>
        </div>
    `;

    // Fetch AI itinerary afterwards
    const payload = { trip_request: `Plan a ${days} day ${style} trip to ${destInput}` };
    try {
        const response = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error("Server error. Check your API key.");
        const data = await response.json();

        // Append itinerary
        let itineraryHtml = '';
        data.daily_plan.forEach(day => {
            itineraryHtml += `
            <div class="itinerary-day shadow-sm">
                <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-circle-dot me-2"></i>${day.day}: ${day.title}</h5>
                <ul class="list-unstyled ms-4">
                    ${day.activities.map(act => `<li class="mb-2 fs-6"><i class="fa-solid fa-location-dot text-primary me-2"></i>${act}</li>`).join('')}
                </ul>
            </div>`;
        });

// After fetching data from /generate
const budget = data.estimated_budget_usd;

document.getElementById('output').innerHTML += `
    <div class="mt-4 p-3 bg-success text-white rounded-3">
        <h5 class="fw-bold"><i class="fa-solid fa-dollar-sign me-2"></i>Estimated Trip Cost</h5>
        <p class="fs-5 mb-0">$${budget} USD</p>
    </div>
`;

        // Recommended travel tips at the bottom only (without repeating weather)
        let tipsHtml = `
            <ul class="mt-3 mb-0">
                <li class="mb-1 text-dark">Use public transportation</li>
                <li class="mb-1 text-dark">Eat at local restaurants</li>
                <li class="mb-1 text-dark">Haggle at markets</li>
            </ul>
        `;

        document.getElementById('output').innerHTML += `
            <div class="mt-4">${itineraryHtml}</div>
            <div class="mt-4 p-4 bg-light rounded-3 border-start border-warning border-4">
                <h5 class="fw-bold text-dark"><i class="fa-solid fa-lightbulb text-warning me-2"></i>Recommended Travel Tips</h5>
                ${tipsHtml}
            </div>
        `;
    } catch (error) {
        console.error(error);
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
